<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pencil Sharpener Blog</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" type="text/javascript"></script>
</head>
<body>

    <!-- Sidebar -->
    <div id="sidebar">
        <button id="sidebar-button">›</button>
        <nav>
            <h2>Menu</h2>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Blog</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </div>

    <!-- Main Content -->
    <main>
        <h1>The Pencil Sharpener Blog</h1>
        <p>Welcome to the best pencil sharpener blog on the internet!</p>

        <hr>

        <!-- Question 2: TODO List -->
        <section>
            <h2>My TODO List</h2>
            <input type="text" id="task-name" placeholder="Enter a task...">
            <button id="add-todo">Add TODO</button>
            <ul id="todo-list"></ul>
        </section>

        <hr>

        <!-- Question 3: Greeter -->
        <section>
            <h2>Greeter</h2>
            <label>First Name: <input type="text" id="first-name" placeholder="First name"></label>
            <label>Last Name: <input type="text" id="last-name" placeholder="Last name"></label>
            <p id="message">Hello !</p>
        </section>
    </main>

</body>
</html>
